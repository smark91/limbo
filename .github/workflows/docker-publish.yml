name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom tag version (defaults to dev-<sha> if empty)'
        required: false
        default: ''


env:
  REGISTRY: ghcr.io
  # This will resolve to owner/repository (e.g. smark91/limbo)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract tag name and pre-release status
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manually entered input version
            VERSION="${{ github.event.inputs.version }}"
            VERSION_NO_V=${VERSION#v}
            echo "version=${VERSION_NO_V}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            # Use Git tag
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION_NO_V=${VERSION#v}
            echo "version=${VERSION_NO_V}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            
            # Check if tag is a pre-release (contains a hyphen, e.g., v1.0.0-beta)
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            # Fallback for manual/branch runs
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi


      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Install Windows cross-compiler (amd64 runner only)
        if: matrix.platform.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build native Linux Go binary
        run: |
          mkdir -p dist
          # Build native Linux binary natively on respective architecture
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.platform.arch }} go build -o dist/limbo-linux-${{ matrix.platform.arch }} -ldflags="-s -w" .

      - name: Build Windows binary (amd64 runner only)
        if: matrix.platform.arch == 'amd64'
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build -o dist/limbo-windows-amd64.exe -ldflags="-s -w" .

      - name: Upload Binaries as Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.platform.arch }}
          path: dist/*
          retention-days: 1

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.get_version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_version.outputs.version }}


      - name: Build and push Docker image by architecture
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}-${{ matrix.platform.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARCH=${{ matrix.platform.arch }}
            VERSION=${{ steps.get_version.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform.arch }},mode=max

  merge-manifests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write

    steps:
      - name: Extract tag name and pre-release status
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Use manually entered input version
            VERSION="${{ github.event.inputs.version }}"
            VERSION_NO_V=${VERSION#v}
            echo "version=${VERSION_NO_V}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            # Use Git tag
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION_NO_V=${VERSION#v}
            echo "version=${VERSION_NO_V}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            
            # Check if tag is a pre-release (contains a hyphen, e.g., v1.0.0-beta)
            if [[ "$VERSION" == *-* ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            # Fallback for manual/branch runs
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch image
        run: |
          TAG_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION_TAG="${{ steps.get_version.outputs.version }}"
          
          # Build target tags array
          TAGS=("-t" "${TAG_BASE}:${VERSION_TAG}")
          
          # Handle semver tag aliases (e.g. major, major.minor)
          if [[ "${VERSION_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            MAJOR_MINOR=$(echo ${VERSION_TAG} | cut -d. -f1-2)
            MAJOR=$(echo ${VERSION_TAG} | cut -d. -f1)
            
            TAGS+=("-t" "${TAG_BASE}:${MAJOR_MINOR}")
            TAGS+=("-t" "${TAG_BASE}:${MAJOR}")
            
            # Also tag latest if not pre-release
            if [[ "${{ steps.get_version.outputs.prerelease }}" == "false" ]]; then
              TAGS+=("-t" "${TAG_BASE}:latest")
            fi
          fi
          
          # Create and push multi-arch image using buildx imagetools
          docker buildx imagetools create "${TAGS[@]}" \
            ${TAG_BASE}:${VERSION_TAG}-amd64 \
            ${TAG_BASE}:${VERSION_TAG}-arm64

      - name: Download amd64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries-amd64
          path: dist

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries-arm64
          path: dist

      - name: Create GitHub Release
        if: steps.get_version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: ${{ steps.get_version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/limbo-linux-amd64
            dist/limbo-linux-arm64
            dist/limbo-windows-amd64.exe
